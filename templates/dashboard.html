<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#84fab0,#8fd3f4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dashboard-box{
    background:white;
    padding:40px;
    width:350px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    color:#333;
    margin-bottom:10px;
}

p{
    font-size:18px;
    color:#555;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    background:#4CAF50;
    color:white;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}

</style>

</head>

<body>

<div class="dashboard-box">

<h2>Welcome Student</h2>

<p>Login Successful 🎉</p>

<button onclick="logout()">Logout</button>

</div>

<script>
function logout(){
    window.location.href="/login";
}
</script>

</body>
</html>
